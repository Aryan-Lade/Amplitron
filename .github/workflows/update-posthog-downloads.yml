name: Update PostHog Downloads insight

on:
  release:
    types: [published]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-posthog:
    runs-on: ubuntu-latest
    steps:
      - name: Sync downloads from GitHub
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
        run: python3 -c "import json,urllib.request as u,os;r=json.loads(u.urlopen(u.Request(f'https://api.github.com/repos/{os.environ[\"GITHUB_REPO\"]}/releases',headers={'User-Agent':'A'})).read());l=sum(a['download_count'] for x in r for a in x.get('assets',[]) if 'Linux' in a['name']);m=sum(a['download_count'] for x in r for a in x.get('assets',[]) if 'macOS' in a['name']);w=sum(a['download_count'] for x in r for a in x.get('assets',[]) if 'Windows' in a['name']);sql=f\"SELECT 'Linux' AS operating_system, {l} AS download_count UNION ALL SELECT 'macOS' AS operating_system, {m} AS download_count UNION ALL SELECT 'Windows' AS operating_system, {w} AS download_count\";p=json.dumps({'query':{'kind':'DataVisualizationNode','source':{'kind':'HogQLQuery','query':sql}}}).encode();req=u.Request('https://us.posthog.com/api/projects/355360/insights/7587728/',data=p,headers={'Authorization':f'Bearer {os.environ[\"POSTHOG_API_KEY\"]}','Content-Type':'application/json'},method='PATCH');print(json.loads(u.urlopen(req).read())['name'])"
